name: Swift Package

on:
  pull_request:
  push:
    branches:
      - main
      - 'feat/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: swift --version
      - run: swift build -v --package-path Packages/MoaOps
      # Xcode 15's macOS XCTest runner stalls when PulseCallCoreTests shares a
      # process with its URLSession-backed tests. Run every member in a fresh
      # runner, then run the remaining suite; no test is omitted.
      - run: |
          swift test list --package-path Packages/MoaOps | while IFS= read -r test; do
            case "$test" in
              *PulseCallCoreTests*) swift test -v --package-path Packages/MoaOps --filter "$test" ;;
            esac
          done
      - run: swift test -v --package-path Packages/MoaOps --skip PulseCallCoreTests
      - run: >-
          xcodebuild
          -project MoaCompanion.xcodeproj
          -scheme MoaCompanion
          -configuration Debug
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build
