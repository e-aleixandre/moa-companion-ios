name: Swift Package

on:
  pull_request:
  push:
    branches:
      - main
      - 'feat/**'

permissions:
  contents: read

concurrency:
  group: swift-package-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: swift --version
      - run: swift build --package-path Packages/MoaOps
      # Xcode's shared XCTest process reproducibly hangs around the durable budget ledger group.
      # Keep exactly that group in its own SwiftPM XCTest process; all other core tests stay together.
      - run: swift test --package-path Packages/MoaOps --filter MoaOpsCoreTests
      # Diagnostic: XCTest can leave async presentation work alive between test
      # classes. Keep the class boundaries visible until the offending lifecycle
      # is identified; remove this split or retain it with evidence afterwards.
      - run: swift test --package-path Packages/MoaOps --filter CompanionAppModelTests
      - run: swift test --package-path Packages/MoaOps --filter CompanionPresentationTests
      - run: swift test --package-path Packages/MoaOps --filter MoaOpsPresentationTests
      - run: swift test --package-path Packages/MoaOps --filter PulseCallPresentationTests
      - run: swift test --package-path Packages/MoaOps --filter MoaOpsBudgetTests
      - run: >-
          xcodebuild
          -project MoaCompanion.xcodeproj
          -scheme MoaCompanion
          -configuration Debug
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build
