name: Swift Package

on:
  pull_request:
  push:
    branches:
      - main
      - 'feat/**'

permissions:
  contents: read

concurrency:
  group: swift-package-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: swift --version
      - run: swift build --package-path Packages/MoaOps
      - run: swift test --package-path Packages/MoaOps --filter MoaOpsCoreTests
      - run: swift test --package-path Packages/MoaOps --filter MoaOpsPresentationTests
      - run: >-
          xcodebuild
          -project MoaCompanion.xcodeproj
          -scheme MoaCompanion
          -configuration Debug
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          -derivedDataPath $RUNNER_TEMP/dd
          CODE_SIGNING_ALLOWED=NO
          build
      - name: Inspect compiled Info.plist (UIBackgroundModes)
        run: |
          set -euo pipefail
          APP=$(find "$RUNNER_TEMP/dd/Build/Products" -maxdepth 2 -name '*.app' -type d | head -1)
          echo "app bundle: $APP"
          test -n "$APP" && test -d "$APP"
          PLIST="$APP/Info.plist"
          test -f "$PLIST"
          echo "=== UIBackgroundModes ==="
          plutil -extract UIBackgroundModes raw -expect array "$PLIST"
          MODE=$(plutil -extract UIBackgroundModes.0 raw "$PLIST")
          echo "first mode: $MODE"
          test "$MODE" = "audio"


