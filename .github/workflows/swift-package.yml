name: Swift Package

on:
  pull_request:
  push:
    branches:
      - main
      - 'feat/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: swift --version
      - run: swift build -v
      - run: swift test -v
      - run: >-
          xcodebuild
          -project MoaCompanion.xcodeproj
          -scheme MoaCompanion
          -configuration Debug
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build
